<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/style.css" />
    <title>ejercicio-tailwind</title>
  </head>
  <body class="flex">
    <aside class="w-64 h-screen bg-gray-900 text-white p-5">
      <h1 class="text-2xl font-bold mb-6">Dashboard</h1>

      <nav>
        <a href="#" class="block p-2 rounded hover:bg-gray-700">Home</a>
        <a href="#" class="block p-2 rounded hover:bg-gray-700">Profile</a>
        <a href="#" class="block p-2 rounded hover:bg-gray-700">Messages</a>
        <a href="#" class="block p-2 rounded hover:bg-gray-700">History</a>
        <a href="#" class="block p-2 rounded hover:bg-gray-700">Tasks</a>
        <a href="#" class="block p-2 rounded hover:bg-gray-700">Communities</a>
        <a href="#" class="block p-2 rounded hover:bg-gray-700 mt-10"
          >Settings</a
        >
        <a href="#" class="block p-2 rounded hover:bg-gray-700">Support</a>
        <a href="#" class="block p-2 rounded hover:bg-gray-700">Privacy</a>
      </nav>
    </aside>
    <header class="w-screen ml-auto">
      <div class="flex gap-5 ml-10">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="size-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
          />
        </svg>
        <input
          type="text"
          placeholder=""
          class="w-[70%] h-6 border rounded px-2"
        />
        <div class="flex gap-10 ml-auto items-center mr-10">
          <a href="">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"
              />
            </svg>
          </a>
          <a href="">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
              />
            </svg>
          </a>
          <a href="">Worthy AG</a>
        </div>
      </div>
      <!-- Segunda Fila de Header -->
      <div class="flex gap-5 ml-10 mt-3">
        <a href="">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-20"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
            />
          </svg>
        </a>
        <div>
          <p>Hi there,</p>
          <p class="text-2xl mt-3">Worthy AG (@worthyag)</p>
        </div>
        <div class="flex gap-10 ml-auto items-center mr-10">
          <button class="rounded-full bg-sky-500 w-36 text-white">New</button>
          <button class="rounded-full bg-sky-500 w-36 text-white">
            Upload
          </button>
          <button class="rounded-full bg-sky-500 w-36 text-white">Share</button>
        </div>
      </div>
    </header>
  </body>
</html>
